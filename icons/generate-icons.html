<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>生成图标</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    
    h1 {
      color: #333;
    }
    
    .icon-container {
      display: flex;
      gap: 20px;
      margin: 20px 0;
    }
    
    .icon-box {
      background: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }
    
    canvas {
      border: 1px solid #ddd;
      border-radius: 8px;
      display: block;
      margin: 10px auto;
    }
    
    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    
    button:hover {
      background: #45a049;
    }
    
    .instructions {
      margin-top: 30px;
      padding: 20px;
      background: white;
      border-radius: 8px;
    }
    
    .instructions h2 {
      color: #4CAF50;
      margin-bottom: 10px;
    }
    
    .instructions ol {
      margin-left: 20px;
    }
    
    .instructions li {
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <h1>🌐 LLM 翻译器图标生成器</h1>
  
  <div class="icon-container">
    <div class="icon-box">
      <h3>16x16</h3>
      <canvas id="icon16" width="16" height="16"></canvas>
      <button onclick="downloadIcon('icon16', 'icon16.png')">下载</button>
    </div>
    
    <div class="icon-box">
      <h3>48x48</h3>
      <canvas id="icon48" width="48" height="48"></canvas>
      <button onclick="downloadIcon('icon48', 'icon48.png')">下载</button>
    </div>
    
    <div class="icon-box">
      <h3>128x128</h3>
      <canvas id="icon128" width="128" height="128"></canvas>
      <button onclick="downloadIcon('icon128', 'icon128.png')">下载</button>
    </div>
  </div>
  
  <div class="instructions">
    <h2>📝 使用说明</h2>
    <ol>
      <li>点击每个图标下方的"下载"按钮</li>
      <li>将下载的图片保存到 <code>/home/cwh/coding/fanyi/icons/</code> 目录</li>
      <li>文件名保持为：icon16.png, icon48.png, icon128.png</li>
      <li>完成后即可在 Chrome 中加载扩展</li>
    </ol>
  </div>

  <script>
    // Draw icons
    function drawIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      
      // Background gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#4CAF50');
      gradient.addColorStop(1, '#2196F3');
      
      // Draw rounded rectangle background
      ctx.fillStyle = gradient;
      roundRect(ctx, 0, 0, size, size, size * 0.15);
      ctx.fill();
      
      // Draw globe icon
      ctx.strokeStyle = 'white';
      ctx.lineWidth = size * 0.08;
      ctx.lineCap = 'round';
      
      // Circle
      ctx.beginPath();
      ctx.arc(size/2, size/2, size * 0.35, 0, Math.PI * 2);
      ctx.stroke();
      
      // Horizontal line
      ctx.beginPath();
      ctx.moveTo(size * 0.15, size/2);
      ctx.lineTo(size * 0.85, size/2);
      ctx.stroke();
      
      // Vertical line
      ctx.beginPath();
      ctx.moveTo(size/2, size * 0.15);
      ctx.lineTo(size/2, size * 0.85);
      ctx.stroke();
      
      // Ellipses
      ctx.beginPath();
      ctx.ellipse(size/2, size/2, size * 0.25, size * 0.35, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    
    // Helper function to draw rounded rectangle
    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }
    
    // Download icon
    function downloadIcon(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
    
    // Initialize
    drawIcon('icon16', 16);
    drawIcon('icon48', 48);
    drawIcon('icon128', 128);
  </script>
</body>
</html>
