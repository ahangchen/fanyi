<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LLM 翻译器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 320px;
      padding: 15px;
      background: #f5f5f5;
    }
    
    .container {
      text-align: center;
    }
    
    .icon {
      font-size: 48px;
      margin-bottom: 10px;
    }
    
    h1 {
      font-size: 18px;
      margin-bottom: 20px;
      color: #333;
    }
    
    .content {
      text-align: left;
    }
    
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .button {
      padding: 12px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }
    
    .button:hover {
      background: #45a049;
    }
    
    .button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .button.secondary {
      background: #2196F3;
    }
    
    .button.secondary:hover {
      background: #0b7dda;
    }
    
    .status {
      margin-top: 20px;
      padding: 12px;
      background: #e8f5e9;
      border-radius: 4px;
      font-size: 13px;
      display: none;
    }
    
    .status.error {
      background: #ffebee;
      color: #c62828;
    }
    
    .info {
      margin-top: 15px;
      padding: 10px;
      background: #e3f2fd;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
    }
    
    .footer {
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌐</div>
    <h1>LLM 网页翻译器</h1>
    
    <div class="content">
      <div class="button-group">
        <button id="translatePage" class="button">
          📄 翻译整个页面
        </button>
        <button id="translateSelection" class="button secondary" disabled>
          🎯 翻译选中文本
        </button>
      </div>
      
      <div id="status" class="status"></div>
      
      <div class="info">
        <p>💡 提示：选中文本后点击"翻译选中文本"按钮</p>
        <p>⚙️ 点击"设置"配置 API</p>
      </div>
    </div>
    
    <div class="footer">
      <button id="settings" class="button" style="background: #9E9E9E; width: 100%; margin-top: 15px;">
        ⚙️ 设置
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
